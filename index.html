<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>オーダー管理</title>
  <link rel="stylesheet" href="design.css">
</head>

<body>

  <h1>オーダー管理</h1>
  <a href="https://docs.google.com/spreadsheets/d/1aCH9JhmT8ijX0Zv-7rSPGjLgyipYGnb0vXKESkvA_oA/edit" target="_blank">
    表示元シート
  </a>

  <div id="list"></div>

  <script>
    fetch("GASのURL?t=" + new Date().getTime())
      .then(res => res.json())
      .then(data => {
        const list = document.getElementById("list");
        list.innerHTML = "";

        data.forEach(row => {
          const card = document.createElement("div");
          card.className = "card";

          // 日付フォーマット
          let date = row["開催日"];
          if (date) {
            const d = new Date(date);
            if (!isNaN(d)) {
              const jst = new Date(d.getTime() + 9 * 60 * 60 * 1000);
              date =
                jst.getFullYear() + "/" +
                String(jst.getMonth() + 1).padStart(2, "0") + "/" +
                String(jst.getDate()).padStart(2, "0");
            }
          }

          card.innerHTML = `
            <div class="top">${date || ""}</div>
            <div class="title">${row["公演名"] || ""}</div>

            <div class="info">📍 ${row["開催場所"] || ""}</div>
            <div class="info">🎫 ${row["枚数"] || 0} 枚</div>

            <div class="divider"></div>

            <div class="sub">申込者: ${row["申込者名"] || ""}</div>
            <div class="sub">📧 ${row["メールアドレス"] || ""}</div>

            ${row["備考"] ? `<div class="memo">📝 ${row["備考"]}</div>` : ""}
          `;

          list.appendChild(card);
        });
      });
  </script>

</body>
</html>
``
