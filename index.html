<!DOCTYPE html>
<html lang="ja">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>オーダー管理</title>
  <link rel="stylesheet" href="design.css">
</head>

<body>

  <h1>オーダー管理</h1>
  <a href="https://docs.google.com/spreadsheets/d/1aCH9JhmT8ijX0Zv-7rSPGjLgyipYGnb0vXKESkvA_oA/edit?gid=0#gid=0">表示元シート</a>
  <br>

  <!-- ✅ 表を表示する場所 -->
  <table id="table"></table>

  
<div id="list"></div>

<script>
fetch("https://script.google.com/macros/s/AKfycbza3OmnyOQ0zC8Tdwf9LfPBuktdJ-fJbu9aL7_fteLDJjOMUi6BukDas-ZdVtS-9k920w/exec?t=" + new Date().getTime())
  .then(res => res.json())
  .then(data => {
    const list = document.getElementById("list");
    list.innerHTML = "";

    const headers = Object.keys(data[0]);

    data.forEach(row => {
      const card = document.createElement("div");
      card.className = "card";

      headers.forEach((h, index) => {
        let value = row[h];

        // 日付変換
        if (index === 1 && value) {
          const d = new Date(value);
          if (!isNaN(d)) {
            const jst = new Date(d.getTime() + 9 * 60 * 60 * 1000);
            value =
              jst.getFullYear() + "/" +
              String(jst.getMonth() + 1).padStart(2, "0") + "/" +
              String(jst.getDate()).padStart(2, "0");
          }
        }

        const item = document.createElement("div");
        item.innerHTML = `<strong>${h}:</strong> ${value}`;
        card.appendChild(item);
      });

      list.appendChild(card);
    });
  });
</script>


</body>
</html>
