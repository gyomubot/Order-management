<!DOCTYPE html>
<html lang="ja">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>オーダー管理</title>
  <link rel="stylesheet" href="design.css">
</head>

<body>

  <h1>オーダー管理</h1>
  <a href="https://docs.google.com/spreadsheets/d/1aCH9JhmT8ijX0Zv-7rSPGjLgyipYGnb0vXKESkvA_oA/edit?gid=0#gid=0">表示元シート</a>
  <br>

  <!-- ✅ 表を表示する場所 -->
  <table id="table"></table>

  <script>
  fetch("https://script.google.com/macros/s/AKfycbza3OmnyOQ0zC8Tdwf9LfPBuktdJ-fJbu9aL7_fteLDJjOMUi6BukDas-ZdVtS-9k920w/exec?t=" + new Date().getTime())
    .then(res => res.json())
    .then(data => {
      const table = document.getElementById("table");
      table.innerHTML = "";

      const headers = Object.keys(data[0]);

      // ヘッダー行
      const headerRow = document.createElement("tr");
      headers.forEach(h => {
        const th = document.createElement("th");
        th.textContent = h;
        headerRow.appendChild(th);
      });
      table.appendChild(headerRow);

      // データ行
      data.forEach(row => {
        const tr = document.createElement("tr");

        headers.forEach((h, index) => {
          const td = document.createElement("td");
          let value = row[h];

          // ✅ 2列目だけ（index = 1）
          if (index === 1 && value) {
            const d = new Date(value);

            if (!isNaN(d)) {
              // ✅ 日本時間に変換（+9時間）
              const jst = new Date(d.getTime() + 9 * 60 * 60 * 1000);

              value =
                jst.getFullYear() + "/" +
                String(jst.getMonth() + 1).padStart(2, "0") + "/" +
                String(jst.getDate()).padStart(2, "0");
            }
          }

          td.textContent = value;
          tr.appendChild(td);
        });

        table.appendChild(tr);
      });
    });
  </script>


</body>
</html>
